name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra cdk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: CDK synth
        run: uv run cdk synth --quiet --no-asset-bundling --app "python infra/cdk/app.py"
        env:
          CDK_DEFAULT_ACCOUNT: "123456789012"
          CDK_DEFAULT_REGION: "us-east-1"

      - name: Lint
        run: uv run ruff check tools/

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --no-install-project

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build Substrate
        run: |
          git clone https://github.com/scttfrdmn/substrate.git ~/src/substrate
          cd ~/src/substrate && make build

      - name: Install pytest-substrate
        run: uv pip install ~/src/substrate/python

      - name: Run integration tests
        run: uv run pytest -m "not live and not e2e" tools/ -v
        env:
          CDK_DEFAULT_ACCOUNT: "123456789012"
          CDK_DEFAULT_REGION: "us-east-1"
